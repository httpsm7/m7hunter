<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>M7Hunter V7 — Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060a0f;color:#e2e8f0;font-family:'Courier New',monospace;font-size:13px}
header{background:#0d1117;border-bottom:1px solid #00ff8833;padding:12px 20px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:10}
header h1{color:#00ff88;font-size:1.1rem;letter-spacing:.15em;font-weight:900}
header .tag{color:#475569;font-size:.65rem;letter-spacing:.2em}
.status-bar{display:flex;gap:20px;margin-left:auto;align-items:center}
.stat{text-align:center}
.stat .val{font-size:1.1rem;font-weight:700;color:#00ff88}
.stat .lbl{font-size:.6rem;color:#475569;letter-spacing:.1em}
.toolbar{padding:10px 20px;background:#080c13;border-bottom:1px solid #1e293b;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.btn{padding:5px 14px;border:1px solid #334155;background:#0d1117;color:#94a3b8;cursor:pointer;border-radius:2px;font-family:inherit;font-size:.72rem;transition:all .15s}
.btn:hover{border-color:#00ff88;color:#00ff88}
.btn.active{border-color:#00ff88;color:#00ff88;background:#00ff8811}
.btn.danger{border-color:#ef4444;color:#ef4444}
.btn.danger:hover{background:#ef444411}
#search{background:#0d1117;border:1px solid #334155;color:#e2e8f0;padding:5px 10px;font-family:inherit;font-size:.72rem;width:220px;border-radius:2px;outline:none}
#search:focus{border-color:#00ff88}
main{display:grid;grid-template-columns:260px 1fr;height:calc(100vh - 90px)}
aside{background:#080c13;border-right:1px solid #1e293b;padding:14px;overflow-y:auto}
aside h3{color:#475569;font-size:.6rem;letter-spacing:.2em;margin-bottom:10px}
.sev-list{display:flex;flex-direction:column;gap:6px}
.sev-item{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;border:1px solid #1e293b;border-radius:2px;cursor:pointer;transition:border-color .1s}
.sev-item:hover,.sev-item.active{border-color:var(--c)}
.sev-item .badge{font-size:.7rem;font-weight:700;color:var(--c)}
.sev-item .cnt{font-size:1rem;font-weight:700;color:var(--c)}
section{padding:14px;overflow-y:auto}
#findings-list{display:flex;flex-direction:column;gap:8px}
.finding{border:1px solid #1e293b;border-radius:3px;overflow:hidden;transition:border-color .15s}
.finding:hover{border-color:#334155}
.finding-hdr{display:flex;align-items:center;gap:10px;padding:8px 12px;cursor:pointer;background:#0d1117}
.sev-badge{font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:2px;border:1px solid;letter-spacing:.1em}
.finding-url{color:#94a3b8;font-size:.72rem;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.finding-type{color:#e2e8f0;font-size:.78rem;font-weight:700}
.finding-body{padding:10px 12px;background:#060a0f;border-top:1px solid #1e293b;display:none}
.finding-body.open{display:block}
.detail-row{display:flex;gap:8px;margin-bottom:6px;font-size:.7rem}
.detail-row .k{color:#475569;min-width:80px}
.detail-row .v{color:#94a3b8;word-break:break-all}
.poc-box{background:#0d1117;border:1px solid #334155;padding:8px;border-radius:2px;font-size:.68rem;color:#00ff88;margin-top:8px;word-break:break-all;cursor:pointer;position:relative}
.poc-box:hover::after{content:"Copy";position:absolute;right:8px;top:8px;color:#475569;font-size:.6rem}
.conf-bar{height:4px;background:#1e293b;border-radius:2px;margin-top:6px;overflow:hidden}
.conf-fill{height:100%;border-radius:2px;transition:width .3s}
.live-dot{width:7px;height:7px;border-radius:50%;background:#00ff88;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.progress{padding:14px;background:#0d1117;border-bottom:1px solid #1e293b;font-size:.7rem;color:#475569;display:flex;align-items:center;gap:10px}
.progress-bar{flex:1;height:4px;background:#1e293b;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:#00ff88;border-radius:2px;transition:width .3s}
#log{font-size:.65rem;color:#475569;max-height:120px;overflow-y:auto;padding:8px 20px;background:#030508;border-top:1px solid #1e293b}
.log-line{padding:1px 0}
.log-line.warn{color:#f59e0b}
.log-line.error{color:#ef4444}
.log-line.success{color:#00ff88}
.empty{color:#334155;text-align:center;padding:40px;font-size:.8rem}
</style>
</head>
<body>
<header>
  <h1>M7HUNTER</h1>
  <div class="tag">MILKYWAY INTELLIGENCE // AUTHORIZED USE ONLY</div>
  <div class="status-bar">
    <div class="stat"><div class="val" id="s-total">0</div><div class="lbl">TOTAL</div></div>
    <div class="stat"><div class="val" id="s-crit" style="color:#ef4444">0</div><div class="lbl">CRITICAL</div></div>
    <div class="stat"><div class="val" id="s-high" style="color:#f59e0b">0</div><div class="lbl">HIGH</div></div>
    <div class="stat"><div class="val" id="s-med" style="color:#38bdf8">0</div><div class="lbl">MEDIUM</div></div>
    <div id="live-indicator" class="live-dot" title="Live" style="margin-left:8px;display:none"></div>
  </div>
</header>
<div class="progress" id="progress-bar" style="display:none">
  <span id="progress-step">Scanning…</span>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <span id="progress-pct">0%</span>
</div>
<div class="toolbar">
  <button class="btn active" onclick="filterSev('')">All</button>
  <button class="btn" onclick="filterSev('critical')">Critical</button>
  <button class="btn" onclick="filterSev('high')">High</button>
  <button class="btn" onclick="filterSev('medium')">Medium</button>
  <button class="btn" onclick="filterSev('low')">Low</button>
  <input id="search" placeholder="Search type / URL…" oninput="renderFindings()">
  <button class="btn" onclick="loadFindings()">↻ Refresh</button>
  <button class="btn" onclick="exportJSON()">Export JSON</button>
  <button class="btn danger" id="btn-pause" onclick="togglePause()">⏸ Pause</button>
</div>
<main>
  <aside>
    <h3>SEVERITY BREAKDOWN</h3>
    <div class="sev-list" id="sev-list"></div>
  </aside>
  <section>
    <div id="findings-list"><div class="empty">Waiting for findings…</div></div>
  </section>
</main>
<div id="log"></div>

<script src="/socket.io/socket.io.js" onerror="window._noSio=true"></script>
<script>
const SEV_COLOR={critical:"#ef4444",high:"#f59e0b",medium:"#38bdf8",low:"#a78bfa",info:"#94a3b8"};
let _all=[], _sev="", _paused=false, _socket=null;

// ── WebSocket ─────────────────────────────────────────────────────────
if(typeof io!=="undefined"){
  _socket=io();
  _socket.on("connect",()=>{document.getElementById("live-indicator").style.display="block";addLog("Connected to live feed","success")});
  _socket.on("disconnect",()=>{document.getElementById("live-indicator").style.display="none"});
  _socket.on("new_finding",f=>{_all.push(f);renderFindings();updateStats();addLog(`[${f.severity?.toUpperCase()}] ${f.vuln_type} — ${f.url?.slice(0,60)}`,"success")});
  _socket.on("progress",d=>{
    document.getElementById("progress-bar").style.display="flex";
    document.getElementById("progress-step").textContent=d.step||"";
    document.getElementById("progress-pct").textContent=(d.pct||0)+"%";
    document.getElementById("progress-fill").style.width=(d.pct||0)+"%";
    addLog(d.msg||d.step);
  });
}

function togglePause(){
  _paused=!_paused;
  if(_socket) _socket.emit(_paused?"pause":"resume");
  document.getElementById("btn-pause").textContent=_paused?"▶ Resume":"⏸ Pause";
}

// ── Data ──────────────────────────────────────────────────────────────
async function loadFindings(){
  try{
    const r=await fetch("/api/findings");
    _all=await r.json();
    renderFindings(); updateStats(); updateSidebar();
    addLog(`Loaded ${_all.length} findings`);
  }catch(e){addLog("Failed to load findings","error")}
}

function filterSev(s){
  _sev=s;
  document.querySelectorAll(".toolbar .btn").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
  renderFindings();
}

function renderFindings(){
  const q=(document.getElementById("search").value||"").toLowerCase();
  let items=_all.filter(f=>{
    if(_sev && f.severity?.toLowerCase()!==_sev) return false;
    if(q && !JSON.stringify(f).toLowerCase().includes(q)) return false;
    return true;
  });
  const el=document.getElementById("findings-list");
  if(!items.length){el.innerHTML='<div class="empty">No findings match filter.</div>';return}
  el.innerHTML=items.map((f,i)=>findingHTML(f,i)).join("");
}

function findingHTML(f,i){
  const c=SEV_COLOR[f.severity?.toLowerCase()]||"#94a3b8";
  const conf=Math.round((f.confidence||0)*100);
  const poc=makePoc(f);
  return `<div class="finding">
    <div class="finding-hdr" onclick="toggle(${i})">
      <span class="sev-badge" style="color:${c};border-color:${c}40;background:${c}11">${(f.severity||"info").toUpperCase()}</span>
      <span class="finding-type">${f.vuln_type||"UNKNOWN"}</span>
      <span class="finding-url">${f.url||""}</span>
      <span style="color:#475569;font-size:.65rem">${conf}%</span>
    </div>
    <div class="finding-body" id="fb-${i}">
      <div class="detail-row"><span class="k">URL</span><span class="v">${f.url||""}</span></div>
      <div class="detail-row"><span class="k">Evidence</span><span class="v">${f.detail||f.evidence||""}</span></div>
      <div class="detail-row"><span class="k">Confidence</span><span class="v">${conf}%</span></div>
      <div class="detail-row"><span class="k">Tool</span><span class="v">${f.tool||"m7hunter"}</span></div>
      <div class="conf-bar"><div class="conf-fill" style="width:${conf}%;background:${c}"></div></div>
      ${poc?`<div class="poc-box" onclick="copyPoc(this,'${escape(poc)}')">${poc}</div>`:""}
    </div>
  </div>`;
}

function makePoc(f){
  const url=f.url||""; const payload=(f.payload||"");
  if(!url) return "";
  return `curl -sk "${url}" ${payload?`-d "${payload.replace(/"/g,"'")}"`:""} -H "User-Agent: M7Hunter/7"`;
}

function toggle(i){
  const el=document.getElementById("fb-"+i);
  if(el) el.classList.toggle("open");
}

function copyPoc(el,encoded){
  navigator.clipboard?.writeText(unescape(encoded)).then(()=>{
    el.style.borderColor="#00ff88"; setTimeout(()=>el.style.borderColor="",800);
  });
}

function updateStats(){
  const cnt={critical:0,high:0,medium:0};
  _all.forEach(f=>{const s=f.severity?.toLowerCase(); if(s in cnt) cnt[s]++;});
  document.getElementById("s-total").textContent=_all.length;
  document.getElementById("s-crit").textContent=cnt.critical;
  document.getElementById("s-high").textContent=cnt.high;
  document.getElementById("s-med").textContent=cnt.medium;
}

function updateSidebar(){
  const counts={};
  _all.forEach(f=>{const s=f.severity?.toLowerCase()||"info"; counts[s]=(counts[s]||0)+1;});
  const order=["critical","high","medium","low","info"];
  document.getElementById("sev-list").innerHTML=order.map(s=>`
    <div class="sev-item" style="--c:${SEV_COLOR[s]}" onclick="filterSev('${s}')">
      <span class="badge">${s.toUpperCase()}</span>
      <span class="cnt">${counts[s]||0}</span>
    </div>`).join("");
}

function exportJSON(){
  const blob=new Blob([JSON.stringify(_all,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="m7hunter_findings.json"; a.click();
}

function addLog(msg,cls=""){
  const el=document.getElementById("log");
  const d=document.createElement("div"); d.className="log-line"+(cls?" "+cls:"");
  d.textContent="["+new Date().toTimeString().slice(0,8)+"] "+msg;
  el.appendChild(d); el.scrollTop=el.scrollHeight;
  if(el.children.length>200) el.removeChild(el.firstChild);
}

// Poll every 8 seconds if no WebSocket
const pollInterval = (typeof io==="undefined") ? setInterval(loadFindings,8000) : null;
loadFindings();
</script>
</body>
</html>
