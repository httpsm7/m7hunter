# M7Hunter V7 Configuration
# MilkyWay Intelligence | Author: Sharlix
# Place at ~/.m7hunter.yaml or ~/.m7hunter/config.yaml

# ── Scan Performance ─────────────────────────────
threads: 50
rate: 1000

# ── Timeouts (seconds) ───────────────────────────
timeout_default: 300
timeout_nuclei: 1800
timeout_sqlmap: 600
timeout_gau: 120
timeout_amass: 300

# ── V7 Features ──────────────────────────────────
double_verify: true
http2: true
confidence: 0.8

# ── Output ───────────────────────────────────────
output_dir: results

# ── API Keys (recommended: use env vars instead) ─
# github_token: ""
# shodan_key: ""
# vt_key: ""
# wpscan_token: ""
# interactsh_url: ""

# ── Notifications ────────────────────────────────
# telegram_token: ""
# telegram_chat: ""
# discord_webhook: ""

# ── Proxy (optional) ─────────────────────────────
# proxy: ""

# ── Auth (per-scan via CLI is better) ────────────
# cookie: ""
