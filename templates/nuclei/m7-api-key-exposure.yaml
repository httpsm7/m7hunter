id: m7-api-key-exposure

info:
  name: M7 - API Key & Secret Exposure in Responses
  author: Sharlix
  severity: high
  description: |
    Detects API keys, tokens, and secrets exposed
    in HTTP responses, JS files, and common paths.
  tags: exposure,secrets,api-keys,m7hunter

requests:
  - method: GET
    path:
      - "{{BaseURL}}"
      - "{{BaseURL}}/api"
      - "{{BaseURL}}/api/v1"
      - "{{BaseURL}}/api/v2"
      - "{{BaseURL}}/v1"
      - "{{BaseURL}}/v2"
      - "{{BaseURL}}/swagger.json"
      - "{{BaseURL}}/swagger/v1/swagger.json"
      - "{{BaseURL}}/openapi.json"
      - "{{BaseURL}}/api-docs"
      - "{{BaseURL}}/api/swagger"

    matchers-condition: or
    matchers:
      - type: regex
        regex:
          - "AKIA[0-9A-Z]{16}"
          - "AIza[0-9A-Za-z\\-_]{35}"
          - "ya29\\.[0-9A-Za-z\\-_]+"
          - "eyJ[A-Za-z0-9_-]{10,}\\.[A-Za-z0-9_-]{10,}\\.[A-Za-z0-9_-]+"
          - "sk-[a-zA-Z0-9]{48}"
          - "xox[baprs]-[0-9a-zA-Z]{10,48}"
          - "github_pat_[0-9a-zA-Z_]{82}"
          - "glpat-[0-9a-zA-Z\\-]{20}"
          - "sq0atp-[0-9A-Za-z\\-_]{22}"
          - "AC[a-z0-9]{32}"
        part: body

      - type: word
        words:
          - "\"api_key\":"
          - "\"apiKey\":"
          - "\"access_token\":"
          - "\"client_secret\":"
          - "\"private_key\":"
          - "\"secret_key\":"
          - "\"auth_token\":"
        part: body
        condition: or
