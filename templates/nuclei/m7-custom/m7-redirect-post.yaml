id: m7-redirect-post
info:
  name: M7 - Open Redirect via POST Body
  author: Sharlix
  severity: medium
  description: Open redirect in POST body parameters
  tags: redirect,post,m7hunter

requests:
  - method: POST
    path:
      - "{{BaseURL}}/login"
      - "{{BaseURL}}/auth"
      - "{{BaseURL}}/signin"

    body: "redirect=https://evil.com&next=https://evil.com&return_url=https://evil.com"
    headers:
      Content-Type: application/x-www-form-urlencoded

    matchers-condition: and
    matchers:
      - type: regex
        regex:
          - "Location:.*evil\.com"
        part: header

      - type: status
        status:
          - 301
          - 302
          - 307
