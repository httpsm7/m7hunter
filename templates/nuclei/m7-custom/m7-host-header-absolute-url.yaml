id: m7-host-header-absolute-url
info:
  name: M7 - Host Header Bypass via Absolute URL in Request Line
  author: Sharlix
  severity: medium
  description: Sends absolute URL in request to bypass virtual host routing
  tags: host-header,absolute-url,m7hunter

requests:
  - raw:
      - |
        GET https://evil.com HTTP/1.1
        Host: {{Hostname}}
        Connection: close

    matchers:
      - type: dsl
        dsl:
          - "status_code == 200 || status_code == 301 || status_code == 302"
