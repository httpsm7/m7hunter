id: m7-jwt-cookie-theft
info:
  name: M7 - JWT in Cookie without HttpOnly Flag
  author: Sharlix
  severity: medium
  description: JWT stored in cookie without HttpOnly flag — vulnerable to XSS theft
  tags: jwt,cookie,httponly,m7hunter

requests:
  - method: GET
    path:
      - "{{BaseURL}}"
      - "{{BaseURL}}/login"
      - "{{BaseURL}}/api/auth"

    matchers-condition: and
    matchers:
      - type: regex
        regex:
          - "eyJ[A-Za-z0-9_-]{10,}"
        part: header

      - type: dsl
        dsl:
          - "!contains(to_lower(all_headers), 'httponly')"
