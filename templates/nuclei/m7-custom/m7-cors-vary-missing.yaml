id: m7-cors-vary-missing
info:
  name: M7 - CORS Missing Vary Origin Header (Cache Poisoning)
  author: Sharlix
  severity: medium
  description: CORS response missing Vary:Origin header — vulnerable to cache poisoning
  tags: cors,cache,vary,m7hunter

requests:
  - method: GET
    path:
      - "{{BaseURL}}/api"

    headers:
      Origin: "https://evil.com"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "Access-Control-Allow-Origin"
        part: header

      - type: dsl
        dsl:
          - "!contains(to_lower(all_headers), 'vary: origin')"
