id: m7-takeover-azure
info:
  name: M7 - Azure Subdomain Takeover
  author: Sharlix
  severity: critical
  description: Detects unclaimed Azure blob storage and app service subdomains
  tags: takeover,azure,m7hunter

requests:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: or
    matchers:
      - type: word
        words:
          - "404 Web Site not found"
          - "No web site exists at this address"
          - "BlobNotFound"
          - "PublicContainer not found"
          - "This web app is stopped"
        part: body
        condition: or
