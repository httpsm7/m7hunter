id: m7-redirect-oauth
info:
  name: M7 - Open Redirect in OAuth redirect_uri
  author: Sharlix
  severity: high
  description: OAuth redirect_uri bypass leading to token theft
  tags: redirect,oauth,m7hunter
  reference:
    - https://portswigger.net/web-security/oauth

requests:
  - method: GET
    path:
      - "{{BaseURL}}/oauth/authorize?client_id=test&redirect_uri=https://evil.com&response_type=code"
      - "{{BaseURL}}/oauth2/authorize?client_id=test&redirect_uri=//evil.com&response_type=token"
      - "{{BaseURL}}/auth/callback?redirect_uri=https://evil.com"
      - "{{BaseURL}}/connect/authorize?client_id=test&redirect_uri=https://evil.com"

    matchers-condition: and
    matchers:
      - type: regex
        regex:
          - "Location:.*evil\.com"
        part: header

      - type: status
        status:
          - 302
          - 301
