id: m7-takeover-aws-s3
info:
  name: M7 - AWS S3 Bucket Subdomain Takeover
  author: Sharlix
  severity: critical
  description: Detects unclaimed S3 bucket subdomain
  tags: takeover,aws,s3,m7hunter

requests:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "NoSuchBucket"
          - "The specified bucket does not exist"
        part: body

      - type: status
        status:
          - 404
