id: m7-xss-dom-sinks
info:
  name: M7 - DOM XSS via JavaScript Sink Detection
  author: Sharlix
  severity: high
  description: Detects DOM XSS sinks in JavaScript code using fragment/hash parameters
  tags: xss,dom,javascript,m7hunter
  reference:
    - https://portswigger.net/web-security/cross-site-scripting/dom-based

requests:
  - method: GET
    path:
      - "{{BaseURL}}#"><img src=x onerror=alert(1)>"
      - "{{BaseURL}}?callback=alert(1)"
      - "{{BaseURL}}?jsonp=alert(1)"
      - "{{BaseURL}}?cb=alert(1)"

    matchers-condition: or
    matchers:
      - type: regex
        regex:
          - "innerHTML\s*=.*location\."
          - "document\.write.*location\."
          - "eval\s*\(.*location\."
          - "setTimeout\s*\(.*location\."
        part: body
        condition: or

      - type: word
        words:
          - "innerHTML"
          - "document.write"
          - "eval("
          - "location.hash"
          - "location.search"
        part: body
        condition: and
