id: m7-cors-null-origin
info:
  name: M7 - CORS Null Origin Allowed
  author: Sharlix
  severity: high
  description: CORS allows null origin — exploitable via sandboxed iframes
  tags: cors,null-origin,m7hunter

requests:
  - method: GET
    path:
      - "{{BaseURL}}/api"
      - "{{BaseURL}}/api/v1"

    headers:
      Origin: "null"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "Access-Control-Allow-Origin: null"
        part: header
