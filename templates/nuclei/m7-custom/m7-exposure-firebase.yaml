id: m7-exposure-firebase
info:
  name: M7 - Firebase Database Misconfiguration
  author: Sharlix
  severity: critical
  description: Firebase database with no auth — publicly readable/writable
  tags: exposure,firebase,m7hunter

requests:
  - method: GET
    path:
      - "{{BaseURL}}/.json"
      - "{{BaseURL}}/users.json"
      - "{{BaseURL}}/admin.json"
      - "{{BaseURL}}/data.json"
      - "{{BaseURL}}/config.json"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: dsl
        dsl:
          - "len(body) > 2"
          - "contains(all_headers, 'application/json')"
          - "!contains(body, 'Permission denied') && !contains(body, 'error')"
        condition: and
