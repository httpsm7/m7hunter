id: m7-exposure-debug-endpoints
info:
  name: M7 - Debug and Admin Endpoints Exposure
  author: Sharlix
  severity: high
  description: Detects exposed debug, admin, and metrics endpoints
  tags: exposure,debug,admin,m7hunter

requests:
  - method: GET
    path:
      - "{{BaseURL}}/debug"
      - "{{BaseURL}}/debug/pprof"
      - "{{BaseURL}}/debug/vars"
      - "{{BaseURL}}/metrics"
      - "{{BaseURL}}/actuator"
      - "{{BaseURL}}/actuator/env"
      - "{{BaseURL}}/actuator/health"
      - "{{BaseURL}}/actuator/dump"
      - "{{BaseURL}}/__debug__"
      - "{{BaseURL}}/console"
      - "{{BaseURL}}/phpinfo.php"
      - "{{BaseURL}}/info.php"
      - "{{BaseURL}}/server-status"
      - "{{BaseURL}}/server-info"

    matchers-condition: or
    matchers:
      - type: word
        words:
          - "goroutine"
          - "heap"
          - "alloc"
          - "php_info"
          - "PHP Version"
          - "spring.datasource"
          - "hikari"
          - "ActiveConnections"
          - "TotalConnections"
        part: body
        condition: or
