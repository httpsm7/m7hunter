id: m7-host-header-oob
info:
  name: M7 - Host Header OOB Detection
  author: Sharlix
  severity: high
  description: Host header injection with OOB callback detection
  tags: host-header,oob,m7hunter

requests:
  - method: GET
    path:
      - "{{BaseURL}}"

    headers:
      Host: "{{interactsh-url}}"
      X-Forwarded-Host: "{{interactsh-url}}"
      X-Forwarded-Server: "{{interactsh-url}}"

    matchers:
      - type: word
        part: interactsh_protocol
        words:
          - "http"
          - "dns"
        condition: or
