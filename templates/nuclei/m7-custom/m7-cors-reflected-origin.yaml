id: m7-cors-reflected-origin
info:
  name: M7 - CORS Reflected Origin with Credentials
  author: Sharlix
  severity: critical
  description: CORS reflects attacker origin AND allows credentials — critical misconfiguration
  tags: cors,credentials,m7hunter
  reference:
    - https://portswigger.net/web-security/cors

requests:
  - method: GET
    path:
      - "{{BaseURL}}/api/user"
      - "{{BaseURL}}/api/profile"
      - "{{BaseURL}}/api/account"

    headers:
      Origin: "https://attacker.evil.com"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "Access-Control-Allow-Origin: https://attacker.evil.com"
        part: header

      - type: word
        words:
          - "Access-Control-Allow-Credentials: true"
        part: header
