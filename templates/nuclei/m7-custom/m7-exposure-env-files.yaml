id: m7-exposure-env-files
info:
  name: M7 - Exposed .env and Config Files
  author: Sharlix
  severity: critical
  description: Detects exposed environment and configuration files with credentials
  tags: exposure,config,m7hunter

requests:
  - method: GET
    path:
      - "{{BaseURL}}/.env"
      - "{{BaseURL}}/.env.local"
      - "{{BaseURL}}/.env.production"
      - "{{BaseURL}}/.env.backup"
      - "{{BaseURL}}/.env.example"
      - "{{BaseURL}}/config.php"
      - "{{BaseURL}}/config.json"
      - "{{BaseURL}}/config.yml"
      - "{{BaseURL}}/config.yaml"
      - "{{BaseURL}}/application.properties"
      - "{{BaseURL}}/application.yml"
      - "{{BaseURL}}/local_settings.py"
      - "{{BaseURL}}/settings.py"
      - "{{BaseURL}}/database.yml"
      - "{{BaseURL}}/db.php"
      - "{{BaseURL}}/wp-config.php"
      - "{{BaseURL}}/wp-config.php.bak"

    matchers-condition: and
    matchers:
      - type: regex
        regex:
          - "DB_PASSWORD\s*=\s*.+"
          - "DATABASE_URL\s*=\s*.+"
          - "SECRET_KEY\s*=\s*.+"
          - "API_KEY\s*=\s*.+"
          - "AWS_SECRET\s*=\s*.+"
          - "password\s*=\s*['"][^'"]{4,}"
          - "define\s*\(\s*['"]DB_PASSWORD"
        part: body
        condition: or

      - type: status
        status:
          - 200
