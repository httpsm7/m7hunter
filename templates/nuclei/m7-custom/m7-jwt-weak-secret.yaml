id: m7-jwt-weak-secret
info:
  name: M7 - JWT Weak Secret Detection
  author: Sharlix
  severity: critical
  description: Identifies JWT tokens signed with common weak secrets
  tags: jwt,weak-secret,m7hunter

requests:
  - method: GET
    path:
      - "{{BaseURL}}/api/profile"
      - "{{BaseURL}}/api/user"

    headers:
      Authorization: "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VyX2lkIjoxLCJyb2xlIjoiYWRtaW4ifQ.dSuCBjHcXpW4MFSGNOpMI-dS8MdB2-0Ky8UfJW8FpiY"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: dsl
        dsl:
          - "len(body) > 50"
          - "!contains(body, 'invalid') && !contains(body, 'expired')"
        condition: and
