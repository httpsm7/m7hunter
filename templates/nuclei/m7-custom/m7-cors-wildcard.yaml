id: m7-cors-wildcard
info:
  name: M7 - CORS Wildcard Origin Misconfiguration
  author: Sharlix
  severity: high
  description: Detects CORS misconfiguration allowing any origin
  tags: cors,m7hunter

requests:
  - method: GET
    path:
      - "{{BaseURL}}/api"
      - "{{BaseURL}}/api/v1"
      - "{{BaseURL}}/api/user"

    headers:
      Origin: "https://evil.com"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "Access-Control-Allow-Origin: *"
          - "Access-Control-Allow-Origin: https://evil.com"
        part: header
        condition: or

      - type: word
        words:
          - "Access-Control-Allow-Credentials: true"
        part: header
