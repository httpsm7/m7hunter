id: m7-cors-subdomain-trust
info:
  name: M7 - CORS Trusts All Subdomains
  author: Sharlix
  severity: high
  description: CORS allows any subdomain — exploitable if any subdomain is compromised
  tags: cors,subdomain,m7hunter

requests:
  - method: GET
    path:
      - "{{BaseURL}}/api"

    headers:
      Origin: "https://evil.{{Hostname}}"

    matchers-condition: and
    matchers:
      - type: dsl
        dsl:
          - "contains(all_headers, 'Access-Control-Allow-Origin: https://evil.')"
