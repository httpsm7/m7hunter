id: m7-takeover-github-pages
info:
  name: M7 - GitHub Pages Subdomain Takeover
  author: Sharlix
  severity: high
  description: Detects unclaimed GitHub Pages subdomain
  tags: takeover,github-pages,m7hunter

requests:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "There isn't a GitHub Pages site here"
        part: body

      - type: status
        status:
          - 404
