id: m7-ssti-polyglot
info:
  name: M7 - SSTI Polyglot Detection
  author: Sharlix
  severity: critical
  description: Universal SSTI detection using polyglot payloads across all template engines
  tags: ssti,m7hunter
  reference:
    - https://portswigger.net/web-security/server-side-template-injection

requests:
  - method: GET
    path:
      - "{{BaseURL}}?name={{7*7}}"
      - "{{BaseURL}}?q=${7*7}"
      - "{{BaseURL}}?s=#{7*7}"
      - "{{BaseURL}}?t=<%= 7*7 %>"
      - "{{BaseURL}}?input={{7*'7'}}"
      - "{{BaseURL}}?v=${{7*7}}"
      - "{{BaseURL}}?data=@(7*7)"
      - "{{BaseURL}}?search=[[${7*7}]]"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "49"
          - "7777777"
        part: body
        condition: or

      - type: dsl
        dsl:
          - "!contains(body, '{{7*7}}') && !contains(body, '${7*7}')"
