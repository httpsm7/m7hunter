id: m7-graphql-introspection
info:
  name: M7 - GraphQL Introspection Enabled
  author: Sharlix
  severity: high
  description: GraphQL introspection enabled — full schema exposed
  tags: graphql,introspection,m7hunter

requests:
  - method: POST
    path:
      - "{{BaseURL}}/graphql"
      - "{{BaseURL}}/api/graphql"
      - "{{BaseURL}}/graphiql"
      - "{{BaseURL}}/v1/graphql"
      - "{{BaseURL}}/query"
      - "{{BaseURL}}/gql"

    body: '{"query":"{__schema{types{name fields{name}}}}"}'
    headers:
      Content-Type: application/json

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "__schema"
          - "types"
        part: body
        condition: and

      - type: status
        status:
          - 200
