id: m7-takeover-shopify
info:
  name: M7 - Shopify Subdomain Takeover
  author: Sharlix
  severity: medium
  description: Detects unclaimed Shopify store subdomain
  tags: takeover,shopify,m7hunter

requests:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers:
      - type: word
        words:
          - "Sorry, this shop is currently unavailable"
          - "shop is unavailable"
        part: body
