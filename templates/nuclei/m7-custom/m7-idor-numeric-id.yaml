id: m7-idor-numeric-id
info:
  name: M7 - IDOR Numeric ID Enumeration
  author: Sharlix
  severity: high
  description: IDOR detection by incrementing/decrementing numeric IDs
  tags: idor,authorization,m7hunter
  reference:
    - https://portswigger.net/web-security/access-control/idor

requests:
  - method: GET
    path:
      - "{{BaseURL}}/api/user/1"
      - "{{BaseURL}}/api/user/2"
      - "{{BaseURL}}/api/order/1"
      - "{{BaseURL}}/api/invoice/1"
      - "{{BaseURL}}/api/account/1"
      - "{{BaseURL}}/api/profile/1"
      - "{{BaseURL}}/user?id=1"
      - "{{BaseURL}}/account?id=1"
      - "{{BaseURL}}/document?id=1"
      - "{{BaseURL}}/file?id=1"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: dsl
        dsl:
          - "contains(all_headers, 'application/json') || len(body) > 100"
          - "!contains(body, 'unauthorized') && !contains(body, 'forbidden') && !contains(body, 'access denied')"
        condition: and
