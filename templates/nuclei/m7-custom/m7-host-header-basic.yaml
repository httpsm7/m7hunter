id: m7-host-header-basic
info:
  name: M7 - Host Header Injection Basic
  author: Sharlix
  severity: high
  description: Basic host header injection — reflected in response
  tags: host-header,m7hunter

requests:
  - method: GET
    path:
      - "{{BaseURL}}"

    headers:
      Host: "evil.com"
      X-Forwarded-Host: "evil.com"

    matchers:
      - type: word
        words:
          - "evil.com"
        part: body
