id: m7-host-header-cache-poison
info:
  name: M7 - Host Header Web Cache Poisoning
  author: Sharlix
  severity: high
  description: Host header injection for web cache poisoning
  tags: host-header,cache-poisoning,m7hunter

requests:
  - method: GET
    path:
      - "{{BaseURL}}"

    headers:
      X-Forwarded-Host: "evil.com"
      X-Host: "evil.com"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "evil.com"
        part: body

      - type: word
        words:
          - "X-Cache: HIT"
          - "Age:"
          - "cf-cache-status"
        part: header
        condition: or
